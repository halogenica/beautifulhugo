# This gets overridden when building for production
baseurl = "http://localhost:1313/"
DefaultContentLanguage = "en"
title = "Beautiful Hugo"
enableGitInfo = true

[[module.imports]]
   path = "github.com/halogenica/beautifulhugo"

[pagination]
  pagerSize = 5

[Services]
  [Services.Disqus]
    # Shortname = "XXX"
  [Services.googleAnalytics]
    # id = "XXX"

[taxonomies]
  category = "categories"
  tag = "tags"

[Params]
  subtitle = "Build a beautiful and simple website in minutes"
  mainSections = ["post", "posts"]
  logo = "/img/avatar-icon.png" # Expecting square dimensions
  favicon = "/img/favicon.ico"
  dateFormat = ":date_long"
  commit = false
  rss = true
  readingTime = true
  wordCount = true
  colorScheme = "auto"
  # mathEngine = "katex"  # "katex" (default), "mathjax" (CDN only), or "none"
  socialShare = true
  delayDisqus = true
  showRelatedPosts = true
  disableFigureOverride = true
  headerImgStyle = "narrow"
  showSource = true
  sourceRepo = "https://github.com/halogenica/beautifulhugo/blob/master/exampleSite/"

  [Params.search]
    back_label = "Back"
    placeholder = "Search..."
    search_label = "Search"
    search_button = "Search"
    lucky_button = "I'm Feeling Lucky"
    results_label = "Search results"
    loading_text = "Searching..."
    no_results_text = "No results found for "
    result_singular = "result"
    result_plural = "results"
    error_index_load = "Error loading search index."
    error_index_loading = "Search index is still loading."
    prev_text = "Previous"
    next_text = "Next"
    untitled_text = "Untitled"

[[Params.bigimg]]
  src = "/img/triangle.jpg"
  desc = "Triangle"
[[Params.bigimg]]
  src = "/img/sphere.jpg"
  desc = "Sphere"
  position = "center top"
[[Params.bigimg]]
  src = "/img/hexagon.jpg"
  desc = "Hexagon"

#[Params.AISearchSummary.Googlebot]
#summaryLimit = 150
#[Params.AISearchSummary.robots]
#summaryLimit = 300


[Params.author]
  name = "Some Person"
  website = "yourwebsite.com"
  email = "youremail@domain.com"
  github = "username"
  twitter = "username"
  linkedin = "in/username" # company/username

[markup.highlight]
  noClasses = false

[markup.goldmark.parser.attribute]
  block = true

[markup.goldmark.renderer]
  unsafe = true

