<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebSite",
  "name": {{ .Site.Title | jsonify }},
  {{- with .Site.Params.alternatePageName -}}
  "alternateName": {{ . | jsonify }},
  {{- end -}}
  "url": {{ .Site.BaseURL | jsonify }},
  "@id": {{ printf "%s#website" .Site.BaseURL | jsonify }}
}
</script>
