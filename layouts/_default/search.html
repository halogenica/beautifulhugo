{{ define "main" }}
  <link rel="stylesheet" href="{{ "/css/search.css" | absURL }}">
  <div class="search-page-container" role="main">

    <div class="search-field-wrapper">
      <span class="fas fa-search search-field-icon" aria-hidden="true"></span>
      <input type="search" class="search-field-input" id="searchInput"
             placeholder="{{ .Site.Params.search.placeholder | default "Search posts and pages…" }}"
             aria-label="{{ .Site.Params.search.search_label | default "Search" }}"
             autocomplete="off" autofocus>
    </div>

    <div class="container{{ if .Params.fullWidth }}-fluid{{ end }}">
      <div class="row">
        <div class="{{ cond .Params.fullWidth "col-12" "col-md-10 offset-md-1" }}">
          <div id="resultsContainer" role="region" aria-live="polite"
               aria-label="{{ .Site.Params.search.results_label | default "Search results" }}"></div>
          <div id="search-pagination" class="post-pager"></div>
        </div>
      </div>
    </div>

  </div>

  <script>
    window.searchIndexURL = "{{ "/index.json" | absURL }}";
    window.searchConfig = {
      resultsLabel: "{{ .Site.Params.search.results_label | default "Search results" }}",
      loadingText: "{{ .Site.Params.search.loading_text | default "Searching…" }}",
      noResultsText: "{{ .Site.Params.search.no_results_text | default "No results found for " }}",
      resultSingular: "{{ .Site.Params.search.result_singular | default "result" }}",
      resultPlural: "{{ .Site.Params.search.result_plural | default "results" }}",
      errorIndexLoad: "{{ .Site.Params.search.error_index_load | default "Error loading search index." }}",
      errorIndexLoading: "{{ .Site.Params.search.error_index_loading | default "Search index is still loading." }}",
      prevText: "{{ .Site.Params.search.prev_text | default "Previous" }}",
      nextText: "{{ .Site.Params.search.next_text | default "Next" }}",
      untitledText: "{{ .Site.Params.search.untitled_text | default "Untitled" }}"
    };
  </script>
  <script src="{{ "/js/fuse.js" | absURL }}"></script>
  <script src="{{ "/js/search.js" | absURL }}"></script>
{{ end }}
