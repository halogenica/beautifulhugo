{{ define "main" }}

{{ $data := .Data }}

<div class="container" role="main">
  <div class="col-lg-8 offset-lg-2 col-md-10 offset-md-1">
    <article class="post-preview">
      <div class="accordion" id="accordion">
        {{ range $key, $value := .Data.Terms.ByCount }}
          <div class="card">
            <div class="card-header" id="header{{ $value.Name | anchorize }}">
              <h2 class="mb-0">
                <button class="btn btn-link btn-block text-left collapsed" type="button" data-toggle="collapse" data-target="#collapse{{ $value.Name | anchorize }}" aria-expanded="false" aria-controls="collapse{{ $value.Name | anchorize }}">
                  {{ $value.Name }}
                  <span class="badge badge-secondary float-right">{{ $value.Count }}</span>
                </button>
              </h2>
            </div>
            <div id="collapse{{ $value.Name | anchorize }}" class="collapse" aria-labelledby="header{{ $value.Name | anchorize }}" data-parent="#accordion">
              <div class="card-body">
                <a href="{{ $data.Plural | absLangURL }}/{{ $value.Name | urlize }}/" class="list-group-item view-all">
                View all</a>
                <div class="list-group">
                  {{ range $item := $value.WeightedPages }}
                    <a href="{{$item.Permalink}}" class="list-group-item">{{ $item.Title }}</a>
                  {{ end }}
                </div>
              </div>
            </div>
          </div>
        {{ end }}
      </div>
    </article>
  </div>
</div>


{{ end }}
