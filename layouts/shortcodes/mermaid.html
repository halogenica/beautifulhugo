{{- $colorScheme := .Page.Site.Params.colorScheme | default "auto" -}}
<script defer src="{{"js/mermaid.js" | relURL}}"></script>
<script defer src="{{"js/mermaid-render.js" | relURL}}"></script>
<div class="mermaid-container" {{ with .Get "align" }}style="text-align:{{ . }}"{{ end }}>
  <div class="mermaid-light"></div>
  <div class="mermaid-dark"></div>
</div>
<pre class="mermaid-src" style="display:none">
{{ safeHTML .Inner  }}
</pre>
